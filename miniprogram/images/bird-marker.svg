// 创建一个SVG格式的鸟类图标，可以转换为PNG
<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <circle cx="16" cy="16" r="14" fill="#4CAF50" stroke="#FFFFFF" stroke-width="2"/>
  <text x="16" y="20" text-anchor="middle" fill="white" font-size="14" font-family="Arial" font-weight="bold">鸟</text>
</svg>